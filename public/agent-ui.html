<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Status — MCP UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #111; color: #eee; padding: 16px; }
        h1 { font-size: 16px; margin-bottom: 8px; color: #888; }
        #counter { font-size: 12px; color: #666; margin-bottom: 16px; }
        #timeline { max-height: 90vh; overflow-y: auto; }
        .event { padding: 8px 12px; margin-bottom: 4px; border-left: 3px solid #333; font-size: 13px; }
        .event .time { color: #666; font-size: 11px; }
        .event .type { font-weight: bold; margin: 0 8px; }
        .event .payload { color: #aaa; margin-top: 4px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
        .event.agent-start { border-color: #4a9; }
        .event.agent-start .type { color: #4a9; }
        .event.agent-status { border-color: #49a; }
        .event.agent-status .type { color: #49a; }
        .event.agent-complete { border-color: #4a4; }
        .event.agent-complete .type { color: #4a4; }
        .event.agent-error { border-color: #a44; background: #1a0000; }
        .event.agent-error .type { color: #f66; }
        .connected { color: #4a4; }
        .disconnected { color: #a44; }
    </style>
</head>
<body>
    <h1>Agent Status — MCP UI Phase 2</h1>
    <div id="counter">
        Status: <span id="status" class="disconnected">Disconnected</span>
        &nbsp;|&nbsp; Events received: <span id="received">0</span>
    </div>
    <div id="timeline"></div>

    <script>
        const timeline = document.getElementById( 'timeline' )
        const statusEl = document.getElementById( 'status' )
        const receivedEl = document.getElementById( 'received' )
        let eventCount = 0

        function addEvent( type, payload ) {
            eventCount++
            receivedEl.textContent = eventCount

            const div = document.createElement( 'div' )
            const cssClass = type.replace( ':', '-' )
            div.className = `event ${cssClass}`

            const time = new Date().toISOString().split( 'T' )[ 1 ].slice( 0, 12 )
            let payloadStr = ''

            try {
                payloadStr = typeof payload === 'string' ? payload : JSON.stringify( payload, null, 2 )
                if( payloadStr.length > 1000 ) {
                    payloadStr = payloadStr.slice( 0, 1000 ) + '\n... (truncated)'
                }
            } catch( e ) {
                payloadStr = String( payload )
            }

            div.innerHTML = `
                <span class="time">${time}</span>
                <span class="type">${type}</span>
                <div class="payload">${payloadStr}</div>
            `

            timeline.prepend( div )
        }

        // --- SSE Connection ---
        function connectSSE() {
            const baseUrl = window.location.origin || 'http://localhost:4100'
            const evtSource = new EventSource( `${baseUrl}/events` )

            evtSource.onopen = function() {
                statusEl.textContent = 'Connected'
                statusEl.className = 'connected'
            }

            evtSource.onerror = function() {
                statusEl.textContent = 'Disconnected'
                statusEl.className = 'disconnected'
            }

            evtSource.onmessage = function( event ) {
                try {
                    const data = JSON.parse( event.data )
                    if( data.type === 'connected' ) {
                        addEvent( 'system:connected', { message: 'SSE stream connected' } )
                    }
                } catch( e ) {
                    // ignore
                }
            }

            const eventTypes = [ 'agent:start', 'agent:status', 'agent:complete', 'agent:error' ]
            eventTypes.forEach( function( type ) {
                evtSource.addEventListener( type, function( event ) {
                    try {
                        const payload = JSON.parse( event.data )
                        addEvent( type, payload )
                    } catch( e ) {
                        addEvent( type, event.data )
                    }
                } )
            } )
        }

        // --- PostMessage Listener (for MCP Apps iframe mode) ---
        window.addEventListener( 'message', function( event ) {
            if( event.data && event.data.type ) {
                addEvent( event.data.type, event.data.payload || event.data )
            }
        } )

        connectSSE()
    </script>
</body>
</html>
